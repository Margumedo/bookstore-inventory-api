# Levanta Postgres + API. Uso: docker compose up --build
# API: http://127.0.0.1:8000  |  DB_HOST=db lo fija Compose (no hace falta tocar .env.dev)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookstore_inventory
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_ENV: dev
      DB_HOST: db
      DB_PORT: "5432"
    env_file:
      - environments/.env.dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
